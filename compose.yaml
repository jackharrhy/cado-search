# Local development / quick-start docker compose.
#
# Pulls the published image from ghcr.io by default. Override `image:` or set
# `build: .` if you want to use a local build instead.
#
#   docker compose up         # start the search UI on :8000
#   docker compose run --rm cado scrape companies --concurrency 24
#   docker compose run --rm cado ingest all

services:
  cado:
    image: ghcr.io/jackharrhy/cado:latest
    # Uncomment to build from the local Dockerfile instead of pulling.
    # build: .
    container_name: cado
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - cado-data:/data
    environment:
      # Override any setting via env vars; see src/cado/settings.py.
      CADO_DATA_DIR: /data
      # CADO_MAX_CONCURRENCY: "24"
      # CADO_REQUESTS_PER_SECOND: "20"

volumes:
  cado-data:
