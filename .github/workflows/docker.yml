name: docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

# Only one image build per ref at a time. Don't cancel in-progress builds on
# main since each one publishes immutable tags (sha-based).
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write              # push to ghcr.io
      attestations: write          # provenance attestations
      id-token: write              # OIDC for attestations

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        # Needed for cross-arch builds (linux/arm64 from an amd64 runner).
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Always tag with the short sha + the ref name; tag :latest on the
          # default branch and on semver tags.
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=cado
            org.opencontainers.image.description=Scraper, DuckDB store, and HTMX search UI for the NL CADO public registries.
            org.opencontainers.image.licenses=Unlicense

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Persistent cache via the GitHub Actions cache backend.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
